<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="title">Linked List Implementation</div>
    <div class="container">
        <div class="input">
            <input type="text" id="input" placeholder="Enter a value">
            <button id="add">Add to head</button>
            <button id="add-tail">Add to tail</button>
            <button id="remove">Remove from head</button>
            <button id="remove-tail">Remove from tail</button>
            <button id="clear">Clear</button>
            
        </div>
        <div class="list" id="list">
            <div class="list-item">
                <div class="list-item-title">Item 1</div>
                <div class="list-item-content">Content 1</div>
            </div>
            <div class="list-item">
                <div class="list-item-title">Item 2</div>
                <div class="list-item-content">Content 2</div>
            </div>
            <div class="list-item">
                <div class="list-item-title">Item 3</div>
                <div class="list-item-content">Content 3</div>
            </div>
            <div class="list-item">
                <div class="list-item-title">Item 4</div>
                <div class="list-item-content">Content 4</div>
            </div>
            <div class="list-item">
                <div class="list-item-title">Item 5</div>
                <div class="list-item-content">Content 5</div>
            </div>
        </div>
    </div>
    <script src="linked-list.js"></script>
</body>
</html>
